server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/wasm application/octet-stream image/svg+xml;

    # Always revalidate these so a new deploy is picked up promptly
    location = /index.html               { add_header Cache-Control "no-cache, no-store, must-revalidate"; }
    location = /service-worker.js        { add_header Cache-Control "no-cache, no-store, must-revalidate"; }
    location = /service-worker-assets.js { add_header Cache-Control "no-cache, no-store, must-revalidate"; }
	
    # Client-side routing fallback
    location / {
		try_files $uri $uri/ /index.html =404;
	}
}
